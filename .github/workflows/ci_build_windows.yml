name: CI Build Windows
on:
  push:
    branches: [ master, main, dev, 'release-*' ]
  pull_request:
    branches: [ master, main, dev ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clone libmodbus
      run: git clone https://github.com/stephane/libmodbus.git

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        target: 'desktop'
        arch: 'win64_msvc2022_64'

    - name: Configure CMake
      shell: pwsh
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

    - name: Build
      run: cmake --build build --config Release

    - name: Run tests
      run: ctest --test-dir build --build-config Release --output-on-failure

    - name: Check binaries
      shell: pwsh
      run: |
        .\build\bin\Release\mbpoll.exe -V
        .\build\bin\Release\mbpoll.exe -h
        if (-not (Test-Path .\build\bin\Release\mbpoll-desktop.exe)) {
          throw "mbpoll-desktop.exe was not built"
        }
