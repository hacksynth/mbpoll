name: Package Windows

on:
  push:
    branches: [ master, main, dev ]
    # Formal releases are published from semantic-version tags on master/main.
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.5.3)'
        required: false

jobs:
  build-setup:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone libmodbus
      run: git clone https://github.com/stephane/libmodbus.git

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event.inputs.version }}") {
          $v = "${{ github.event.inputs.version }}"
        } elseif ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
          $v = $Matches[1]
        } else {
          # Extract version from git describe (e.g. v1.5.3 -> 1.5.3)
          $desc = git describe --tags --match 'v*' 2>$null
          if ($desc -match '^v(\d+\.\d+\.\d+)') {
            $v = $Matches[1]
          } else {
            $v = "0.0.0"
          }
        }
        echo "VERSION=$v" >> $env:GITHUB_OUTPUT
        echo "Version: $v"

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Run tests
      run: ctest --test-dir build --build-config Release --output-on-failure

    - name: Check binary
      run: |
        .\build\bin\Release\mbpoll.exe -V
        .\build\bin\Release\mbpoll.exe -h
      continue-on-error: true

    - name: Download VC++ Redistributable
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path package\win\tmp | Out-Null
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
          -OutFile "package\win\tmp\vc_redist.x64.exe"

    - name: Build Setup with Inno Setup
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $buildDir = "${{ github.workspace }}\build\bin\Release"
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
          /DVERSION="$version" `
          /DBUILDDIR="$buildDir" `
          "package\win\mbpoll.iss"

    - name: Upload Setup artifact
      uses: actions/upload-artifact@v4
      with:
        name: mbpoll-setup-${{ steps.version.outputs.VERSION }}
        path: package/win/installer/*.exe

    - name: Check tag is on master or main
      if: startsWith(github.ref, 'refs/tags/v')
      id: check_branch
      shell: pwsh
      run: |
        $branches = git branch -r --contains $env:GITHUB_SHA
        if ($branches -match 'origin/master|origin/main') {
          echo "ON_MAIN=true" >> $env:GITHUB_OUTPUT
        } else {
          echo "Tag is not on master/main, skipping release"
          echo "ON_MAIN=false" >> $env:GITHUB_OUTPUT
        }

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/v') && steps.check_branch.outputs.ON_MAIN == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: package/win/installer/*.exe
        generate_release_notes: true
        draft: false
        prerelease: false
