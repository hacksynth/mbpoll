name: Build Windows Setup

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.5.3)'
        required: false

jobs:
  build-setup:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clone libmodbus
      run: git clone https://github.com/stephane/libmodbus.git

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event.inputs.version }}") {
          $v = "${{ github.event.inputs.version }}"
        } elseif ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
          $v = $Matches[1]
        } else {
          # Fallback: read from CMakeLists.txt
          $content = Get-Content CMakeLists.txt -Raw
          if ($content -match 'VERSION\s+(\d+\.\d+\.\d+)') {
            $v = $Matches[1]
          } else {
            $v = "0.0.0"
          }
        }
        echo "VERSION=$v" >> $env:GITHUB_OUTPUT
        echo "Version: $v"

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Run tests
      run: ctest --test-dir build --build-config Release --output-on-failure

    - name: Check binary
      run: |
        .\build\bin\Release\mbpoll.exe -V
        .\build\bin\Release\mbpoll.exe -h
      continue-on-error: true

    - name: Download VC++ Redistributable
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path package\win\tmp | Out-Null
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
          -OutFile "package\win\tmp\vc_redist.x64.exe"

    - name: Build Setup with Inno Setup
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $buildDir = "${{ github.workspace }}\build\bin\Release"
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
          /DVERSION="$version" `
          /DBUILDDIR="$buildDir" `
          "package\win\mbpoll.iss"

    - name: Upload Setup artifact
      uses: actions/upload-artifact@v4
      with:
        name: mbpoll-setup-${{ steps.version.outputs.VERSION }}
        path: package/win/installer/*.exe

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: package/win/installer/*.exe
